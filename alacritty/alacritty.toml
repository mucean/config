[[keyboard.bindings]]
chars = "\f"
key = "P"
mods = "Control"

[env]
TERM = "xterm-256color"

[font]
size = 14.0

[font.normal]
family = "DroidSansM Nerd Font Mono"
style = "Regular"

[window]
option_as_alt = "OnlyLeft"

[window.dimensions]
columns = 170
lines = 45

[window.padding]
x = 2
y = 0

[window.position]
x = 550
y = 400

